name: Build Dark-Army — Windows & Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ═══════════════════════════════════════════
  # WINDOWS
  # ═══════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.0 opencv-python-headless onnxruntime==1.19.2 insightface Pillow psutil requests tqdm albumentations scikit-learn scipy matplotlib pyvirtualcam onnx sounddevice python-socketio[client] websocket-client pyinstaller

      - name: Prepare data dirs
        shell: cmd
        run: |
          if not exist "data\faces" mkdir data\faces
          if not exist "models\models\buffalo_l" mkdir models\models\buffalo_l

      - name: Download VC++ Redistributable
        shell: cmd
        run: |
          curl -L -o vc_redist.x64.exe "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          echo VC++ redist downloaded

      - name: Build with PyInstaller
        shell: cmd
        run: |
          pyinstaller --noconfirm darkarmy.spec
          if errorlevel 1 exit /b 1

      - name: Verify build output
        shell: cmd
        run: |
          if not exist "dist\DarkArmy\DarkArmy.exe" (
            echo Build failed: DarkArmy.exe not found
            exit /b 1
          )
          echo Build OK
          dir dist\DarkArmy\DarkArmy.exe

      - name: Install NSIS
        shell: cmd
        run: |
          choco install nsis --yes --no-progress
          if not exist "C:\Program Files (x86)\NSIS\makensis.exe" (
            echo NSIS not found
            exit /b 1
          )
          echo NSIS installed

      - name: Build NSIS installer
        shell: cmd
        run: |
          set PATH=%PATH%;C:\Program Files (x86)\NSIS
          "C:\Program Files (x86)\NSIS\makensis.exe" /V4 installer_darkarmy.nsi
          if errorlevel 1 exit /b 1

      - name: Verify installer
        shell: cmd
        run: |
          if not exist "DarkArmy-Setup.exe" (
            echo Installer not found
            exit /b 1
          )
          echo Installer OK
          dir DarkArmy-Setup.exe

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: DarkArmy-Windows
          path: DarkArmy-Setup.exe
          retention-days: 90

  # ═══════════════════════════════════════════
  # LINUX
  # ═══════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libgl1 libglib2.0-0 \
            libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xfixes0 libxkbcommon-x11-0 \
            libdbus-1-3 libfontconfig1 libfreetype6 \
            portaudio19-dev libportaudio2 \
            fuse libfuse2 dpkg-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6==6.7.0 opencv-python-headless onnxruntime insightface Pillow psutil requests tqdm albumentations scikit-learn scipy matplotlib pyvirtualcam onnx sounddevice python-socketio[client] websocket-client pyinstaller

      - name: Prepare data dirs
        run: |
          mkdir -p data/faces
          mkdir -p models/models/buffalo_l

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name=DarkArmy \
            --onedir \
            --windowed \
            --add-data="assets/styles/theme.qss:assets/styles" \
            --add-data="assets/icons:assets/icons" \
            --add-data="data:data" \
            --hidden-import=PyQt6.QtCore \
            --hidden-import=PyQt6.QtGui \
            --hidden-import=PyQt6.QtWidgets \
            --hidden-import=PyQt6.sip \
            --hidden-import=cv2 \
            --hidden-import=cv2.dnn \
            --hidden-import=numpy \
            --hidden-import=onnxruntime \
            --hidden-import=onnxruntime.capi._pybind_state \
            --hidden-import=onnx \
            --hidden-import=onnx.numpy_helper \
            --hidden-import=insightface \
            --hidden-import=insightface.app \
            --hidden-import=insightface.model_zoo \
            --hidden-import=matplotlib \
            --hidden-import=matplotlib.pyplot \
            --hidden-import=matplotlib.backends.backend_agg \
            --hidden-import=PIL \
            --hidden-import=PIL.Image \
            --hidden-import=psutil \
            --hidden-import=requests \
            --hidden-import=tqdm \
            --hidden-import=sklearn \
            --hidden-import=scipy \
            --hidden-import=albumentations \
            --hidden-import=pyvirtualcam \
            --hidden-import=sounddevice \
            --hidden-import=socketio \
            --hidden-import=engineio \
            --hidden-import=websocket \
            --hidden-import=numpy.testing \
            --hidden-import=unittest \
            --collect-all=insightface \
            --collect-all=onnxruntime \
            --collect-all=albumentations \
            --collect-all=cv2 \
            --exclude-module=tkinter \
            --exclude-module=_tkinter \
            --exclude-module=sympy \
            --exclude-module=Cython \
            --noconfirm \
            main.py

      - name: Verify Linux build
        run: |
          test -f dist/DarkArmy/DarkArmy || { echo "Build failed"; exit 1; }
          du -sh dist/DarkArmy/
          echo "Linux build OK"

      - name: Build AppImage
        run: |
          # Download appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          # Build AppDir
          rm -rf DarkArmy.AppDir
          mkdir -p DarkArmy.AppDir/usr/bin
          mkdir -p DarkArmy.AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p DarkArmy.AppDir/usr/share/applications
          cp -r dist/DarkArmy/* DarkArmy.AppDir/usr/bin/
          cat > DarkArmy.AppDir/AppRun << 'APPRUNEOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export ALBUMENTATIONS_DISABLE_VERSION_CHECK=1
          export NO_ALBUMENTATIONS_UPDATE=1
          export MPLBACKEND=Agg
          export MPLCONFIGDIR="${HOME}/.cache/matplotlib"
          exec "${HERE}/usr/bin/DarkArmy" "$@"
          APPRUNEOF
          chmod +x DarkArmy.AppDir/AppRun
          cp assets/icons/darkarmy_icon_256.png DarkArmy.AppDir/darkarmy.png
          cp assets/icons/darkarmy_icon_256.png DarkArmy.AppDir/usr/share/icons/hicolor/256x256/apps/darkarmy.png
          cat > DarkArmy.AppDir/darkarmy.desktop << 'DEOF'
          [Desktop Entry]
          Name=Dark-Army
          Comment=Real-time face swap + voice changer — by Zero
          Exec=DarkArmy
          Icon=darkarmy
          Terminal=false
          Type=Application
          Categories=Video;AudioVideo;
          DEOF
          cp DarkArmy.AppDir/darkarmy.desktop DarkArmy.AppDir/usr/share/applications/
          ARCH=x86_64 ./appimagetool-x86_64.AppImage DarkArmy.AppDir DarkArmy-x86_64.AppImage
          chmod +x DarkArmy-x86_64.AppImage
          echo "AppImage built: $(du -sh DarkArmy-x86_64.AppImage)"

      - name: Build .deb package
        run: |
          VERSION="1.0.0"
          PKG="darkarmy_${VERSION}_amd64"
          rm -rf "$PKG"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/opt/darkarmy"
          mkdir -p "${PKG}/usr/local/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"
          cat > "${PKG}/DEBIAN/control" << EOF
          Package: darkarmy
          Version: ${VERSION}
          Section: video
          Priority: optional
          Architecture: amd64
          Depends: libgl1, libglib2.0-0, libxcb-xinerama0
          Maintainer: Zero <zero@darkarmy.app>
          Description: Real-time face swap + voice changer
           Dark-Army lets you swap your face AND change your voice in real-time.
           Works with Discord, Zoom, Google Meet, Teams, and OBS.
          EOF
          cat > "${PKG}/DEBIAN/postinst" << 'EOF'
          #!/bin/bash
          # Auto-install audio runtime if missing (needed for voice changer)
          if ! dpkg -l libportaudio2 2>/dev/null | grep -q "^ii"; then
            apt-get install -y libportaudio2 2>/dev/null || true
          fi
          modprobe v4l2loopback devices=1 video_nr=10 card_label="DarkArmy Camera" exclusive_caps=1 2>/dev/null || true
          update-desktop-database /usr/share/applications 2>/dev/null || true
          echo "Dark-Army installed successfully"
          EOF
          chmod 755 "${PKG}/DEBIAN/postinst"
          cat > "${PKG}/DEBIAN/prerm" << 'EOF'
          #!/bin/bash
          pkill -f "DarkArmy" 2>/dev/null || true
          EOF
          chmod 755 "${PKG}/DEBIAN/prerm"
          cp -r dist/DarkArmy/* "${PKG}/opt/darkarmy/"
          cat > "${PKG}/usr/local/bin/darkarmy" << 'EOF'
          #!/bin/bash
          export ALBUMENTATIONS_DISABLE_VERSION_CHECK=1
          export MPLBACKEND=Agg
          export MPLCONFIGDIR="${HOME}/.cache/matplotlib"
          cd /opt/darkarmy
          exec ./DarkArmy "$@"
          EOF
          chmod +x "${PKG}/usr/local/bin/darkarmy"
          cat > "${PKG}/usr/share/applications/darkarmy.desktop" << 'EOF'
          [Desktop Entry]
          Name=Dark-Army
          Comment=Real-time face swap + voice changer — by Zero
          Exec=/usr/local/bin/darkarmy
          Icon=darkarmy
          Terminal=false
          Type=Application
          Categories=Video;AudioVideo;
          EOF
          cp assets/icons/darkarmy_icon_256.png "${PKG}/usr/share/icons/hicolor/256x256/apps/darkarmy.png"
          dpkg-deb --build "$PKG"
          echo "Deb built: $(du -sh ${PKG}.deb)"

      - name: Verify outputs
        run: |
          ls -lh DarkArmy-x86_64.AppImage darkarmy_1.0.0_amd64.deb
          echo "All outputs verified"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: DarkArmy-Linux
          path: |
            DarkArmy-x86_64.AppImage
            darkarmy_1.0.0_amd64.deb
          retention-days: 90

  # ═══════════════════════════════════════════
  # RELEASE
  # ═══════════════════════════════════════════
  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: DarkArmy-Windows
          path: release/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: DarkArmy-Linux
          path: release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Dark-Army ${{ github.ref_name }} — by Zero"
          body: |
            ## ⚡ Dark-Army ${{ github.ref_name }}
            **Real-time face swap + voice changer for video calls. Created by Zero.**

            ---

            ## 📥 Download

            | Platform | File | Install |
            |---|---|---|
            | 🪟 Windows | `DarkArmy-Setup.exe` | Double-click → Next → Finish |
            | 🐧 Linux | `DarkArmy-x86_64.AppImage` | chmod +x then double-click |
            | 🐧 Ubuntu/Debian | `darkarmy_1.0.0_amd64.deb` | sudo dpkg -i |

            ---

            ## 🎭 Features
            - Real-time face swap (GPU-accelerated)
            - Real-time voice changer (RVC / Beatrice v2)
            - Works with Discord, Zoom, Google Meet, Teams, OBS
            - Under 400ms latency on GPU

          files: |
            release/DarkArmy-Setup.exe
            release/DarkArmy-x86_64.AppImage
            release/darkarmy_1.0.0_amd64.deb
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
